# docker-compose.yml — Local Development
# Usage: docker compose up -d
# Loads .env automatically if present. Copy .env.develop → .env to get started.
# See also: docker-compose.staging.yml, docker-compose.production.yml

services:
  postgres:
    image: postgres:15-alpine
    container_name: communityboard-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-communityboard}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_change_me}
    ports:
      # Expose only on loopback so only the host machine can reach the DB
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    networks:
      - communityboard-dev
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-communityboard}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: communityboard-backend-dev
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-communityboard}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-dev_password_change_me}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: development
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-not-for-production-use}
      SERVER_PORT: 8080
      REDIS_HOST: redis
      REDIS_PORT: 6379

    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - communityboard-dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: communityboard-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - communityboard-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: communityboard-frontend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - communityboard-dev
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  etl:
    build:
      context: ./data-engineering
      dockerfile: Dockerfile
    container_name: communityboard-etl-dev
    restart: on-failure
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-communityboard}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-dev_password_change_me}
      PYTHONUNBUFFERED: "1"
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - communityboard-dev
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  pgdata-dev:
    driver: local

networks:
  communityboard-dev:
    driver: bridge
