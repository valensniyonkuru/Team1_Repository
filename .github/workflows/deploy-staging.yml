name: Deploy to Staging

on:
  push:
    branches:
      - develop

permissions:
  contents: read

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-backend:staging
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-backend:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-frontend:staging
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-frontend:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build and push ETL image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./data-engineering/Dockerfile.prod
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-etl:staging
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-etl:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: eu-north-1

      - name: Find running staging instances
        id: find-instances
        run: |
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Environment,Values=staging" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text)

          if [ -z "$INSTANCE_IDS" ]; then
            echo "❌ No running staging instances found. Is the ASG running?"
            exit 1
          fi

          echo "Found instances: $INSTANCE_IDS"
          # SSM send-command needs space-separated list
          echo "instance_ids=$INSTANCE_IDS" >> $GITHUB_OUTPUT

      - name: Deploy via SSM Run Command
        id: ssm-deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Environment,Values=staging" \
            --parameters commands="[
              \"set -e\",
              \"echo 'Deploying to staging environment...'\",
              \"mkdir -p /opt/app\",
              \"cd /opt/app\",
              \"cat > .env <<'ENVEOF'\",
              \"DB_NAME=${{ secrets.STAGING_DB_NAME }}\",
              \"DB_USER=${{ secrets.STAGING_DB_USER }}\",
              \"DB_PASSWORD=${{ secrets.STAGING_DB_PASSWORD }}\",
              \"JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }}\",
              \"REACT_APP_API_URL=${{ secrets.STAGING_API_URL }}\",
              \"DOCKER_REGISTRY=${{ env.DOCKER_REGISTRY }}\",
              \"DOCKER_NAMESPACE=${{ env.DOCKER_NAMESPACE }}\",
              \"MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}\",
              \"MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}\",
              \"SPRING_PROFILES=staging\",
              \"ENVEOF\",
              \"chmod 600 /opt/app/.env\",
              \"echo 'Cleaning up disk space before pull...'\",
              \"docker system prune -af --filter 'until=24h' || true\",
              \"echo 'Pulling latest Docker images...'\",
              \"docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-backend:staging\",
              \"docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-frontend:staging\",
              \"docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-etl:staging\",
              \"echo 'Copying docker-compose file...'\",
              \"cp /opt/app/docker-compose.staging.yml /opt/app/docker-compose.staging.yml.bak 2>/dev/null || true\",
              \"echo 'Restarting containers...'\",
              \"docker compose -f /opt/app/docker-compose.staging.yml down || true\",
              \"docker compose -f /opt/app/docker-compose.staging.yml up -d\",
              \"echo 'Verifying containers...'\",
              \"sleep 10\",
              \"docker ps\",
              \"echo 'Staging deployment completed successfully!'\"
            ]" \
            --comment "Deploy staging ${{ github.sha }}" \
            --timeout-seconds 300 \
            --output text --query "Command.CommandId")

          echo "SSM Command ID: $COMMAND_ID"
          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT

      - name: Copy docker-compose to instances via SSM
        run: |
          # Upload docker-compose.staging.yml content via SSM
          COMPOSE_CONTENT=$(cat docker-compose.staging.yml | base64 -w 0)
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:Environment,Values=staging" \
            --parameters commands="[
              \"echo '$COMPOSE_CONTENT' | base64 -d > /opt/app/docker-compose.staging.yml\",
              \"echo 'docker-compose.staging.yml updated'\"
            ]" \
            --timeout-seconds 30 \
            --output text --query "Command.CommandId"

      - name: Wait for SSM deploy to complete
        run: |
          COMMAND_ID="${{ steps.ssm-deploy.outputs.command_id }}"
          INSTANCE_IDS="${{ steps.find-instances.outputs.instance_ids }}"

          echo "Waiting for deploy command $COMMAND_ID to complete..."

          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "Checking instance $INSTANCE_ID..."
            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID"

            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text)

            OUTPUT=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardOutputContent" --output text)

            echo "--- Output from $INSTANCE_ID ---"
            echo "$OUTPUT"

            if [ "$STATUS" != "Success" ]; then
              ERROR=$(aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" --output text)
              echo "--- Error from $INSTANCE_ID ---"
              echo "$ERROR"
              echo "❌ Deploy failed on instance $INSTANCE_ID with status: $STATUS"
              exit 1
            fi

            echo "✅ Deploy succeeded on instance $INSTANCE_ID"
          done

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Staging deployment completed successfully"
          else
            echo "❌ Staging deployment failed"
            exit 1
          fi
