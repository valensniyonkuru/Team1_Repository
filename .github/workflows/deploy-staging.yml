name: Deploy to Staging

on:
  push:
    branches:
      - develop

permissions:
  contents: read

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-backend:staging
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-backend:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-frontend:staging
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-frontend:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ETL image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./data-engineering/Dockerfile.prod
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-etl:staging
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-etl:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging EC2
        env:
          DEPLOY_KEY: ${{ secrets.EC2_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.STAGING_EC2_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_EC2_USER || 'ubuntu' }}
        run: |
          # Install SSH key
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          
          # Deploy script
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST" <<'EOF'
          set -e
          
          echo "Deploying to staging environment..."
          
          # Navigate to app directory
          cd /opt/app
          
          # Create .env file
          cat > .env <<'ENVEOF'
          DB_NAME=${{ secrets.STAGING_DB_NAME }}
          DB_USER=${{ secrets.STAGING_DB_USER }}
          DB_PASSWORD=${{ secrets.STAGING_DB_PASSWORD }}
          SPRING_PROFILES=staging
          JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }}
          REACT_APP_API_URL=${{ secrets.STAGING_API_URL }}
          DOCKER_REGISTRY=${{ env.DOCKER_REGISTRY }}
          DOCKER_NAMESPACE=${{ env.DOCKER_NAMESPACE }}
          ENVEOF
          
          # Pull latest images
          echo "Pulling latest Docker images..."
          docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-backend:staging
          docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-frontend:staging
          docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-etl:staging
          
          # Stop existing containers
          echo "Stopping existing containers..."
          docker-compose -f docker-compose.staging.yml down || true
          
          # Start new containers
          echo "Starting new containers..."
          docker-compose -f docker-compose.staging.yml up -d
          
          # Wait for database to be ready
          echo "Waiting for database..."
          sleep 10
          
          # Verify deployment
          echo "Verifying deployment..."
          docker-compose -f docker-compose.staging.yml logs backend | head -20
          
          echo "Staging deployment completed successfully!"
          EOF

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Staging deployment completed successfully"
          else
            echo "❌ Staging deployment failed"
            exit 1
          fi
