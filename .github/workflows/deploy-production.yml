name: Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_NAMESPACE: ${{ secrets.DOCKER_USERNAME }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run backend tests
        run: |
          cd backend
          mvn clean verify -DskipITs=false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Run frontend tests
        run: |
          cd frontend
          npm ci
          npm test -- --coverage --watchAll=false

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-backend:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-backend:v${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-frontend:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-frontend:v${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build and push ETL image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./data-engineering/Dockerfile.prod
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-etl:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-etl:v${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: eu-north-1

      - name: Deploy to Production EC2
        env:
          DEPLOY_KEY: ${{ secrets.EC2_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.PRODUCTION_EC2_HOST }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_EC2_USER || 'ubuntu' }}
        run: |
          # Install SSH key
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          # Push public key to EC2 via AWS Instance Connect
          echo "Pushing SSH key via AWS Instance Connect..."
          PUBLIC_KEY=$(ssh-keygen -y -f ~/.ssh/deploy_key)
          INSTANCE_ID=$(aws ec2 describe-instances --filters "Name=ip-address,Values=$DEPLOY_HOST" --query "Reservations[0].Instances[0].InstanceId" --output text)

          if [ "$INSTANCE_ID" != "None" ] && [ -n "$INSTANCE_ID" ]; then
            aws ec2-instance-connect send-ssh-public-key \
              --instance-id "$INSTANCE_ID" \
              --instance-os-user "$DEPLOY_USER" \
              --ssh-public-key "$PUBLIC_KEY" \
              --availability-zone $(aws ec2 describe-instances --instance-ids "$INSTANCE_ID" --query "Reservations[0].Instances[0].Placement.AvailabilityZone" --output text)
          fi

          # Deploy script
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST" <<'EOF'
          set -e

          echo "🚀 Starting production deployment..."

          # Ensure app directory exists and is writable
          sudo mkdir -p /opt/app
          sudo chown $USER:$USER /opt/app
          cd /opt/app

          # Create .env file with production secrets
          cat > .env <<'ENVEOF'
          DB_NAME=${{ secrets.PRODUCTION_DB_NAME }}
          DB_USER=${{ secrets.PRODUCTION_DB_USER }}
          DB_PASSWORD=${{ secrets.PRODUCTION_DB_PASSWORD }}
          SPRING_PROFILES=production
          JWT_SECRET=${{ secrets.PRODUCTION_JWT_SECRET }}
          REACT_APP_API_URL=${{ secrets.PRODUCTION_API_URL }}
          DOCKER_REGISTRY=${{ env.DOCKER_REGISTRY }}
          DOCKER_NAMESPACE=${{ env.DOCKER_NAMESPACE }}
          ENVEOF

          # Backup current state
          echo "Creating backup of current deployment..."
          sudo docker-compose -f docker-compose.production.yml ps > deployment-backup-$(date +%s).log || true

          # Pull latest images
          echo "Pulling latest Docker images..."
          sudo docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-backend:latest
          sudo docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-frontend:latest
          sudo docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-etl:latest

          # Stop existing containers gracefully
          echo "Stopping existing containers..."
          sudo docker-compose -f docker-compose.production.yml down || true

          # Start new containers
          echo "Starting new containers..."
          sudo docker-compose -f docker-compose.production.yml up -d

          # Wait for services to start
          echo "Waiting for services to be ready..."
          sleep 15

          # Health checks
          echo "Running health checks..."
          max_attempts=30
          attempt=1

          while [ $attempt -le $max_attempts ]; do
            if curl -f http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "✅ Backend health check passed"
              break
            fi
            echo "Health check attempt $attempt/$max_attempts..."
            sleep 2
            attempt=$((attempt + 1))
          done

          if [ $attempt -gt $max_attempts ]; then
            echo "❌ Backend health check failed after $max_attempts attempts"
            sudo docker-compose -f docker-compose.production.yml logs backend
            exit 1
          fi

          # Verify all containers are running
          echo "Verifying all containers are running..."
          sudo docker-compose -f docker-compose.production.yml ps

          echo "✅ Production deployment completed successfully!"
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          body: |
            Automated production deployment
            - Backend: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-backend:v${{ github.run_number }}
            - Frontend: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-frontend:v${{ github.run_number }}
            - ETL: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_NAMESPACE }}/communityboard-etl:v${{ github.run_number }}
          draft: false
          prerelease: false

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Production deployment completed successfully"
          else
            echo "❌ Production deployment failed"
            exit 1
          fi
