name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: communityboard
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: Build backend
        working-directory: ./backend
        run: mvn -B clean package -DskipTests
      - name: Run backend tests
        working-directory: ./backend
        run: mvn -B test
        
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/communityboard
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  qa:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Start app via Docker Compose
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: docker compose up -d --build

      - name: Wait for backend to be ready
        run: |
          for i in {1..60}; do
            if curl -fsS "http://localhost:8080/api-docs" > /dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready in time"
          docker compose ps
          docker compose logs backend || true
          exit 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Run API tests (REST Assured)
        working-directory: ./qa/api-tests
        run: mvn -B test

      - name: Parse test results (API tests)
        if: always()
        id: parse-api-results
        run: |
          TOTAL=0; PASSED=0; FAILED=0; SKIPPED=0; ERRORS=0
          for f in qa/api-tests/target/surefire-reports/TEST-*.xml; do
            [ -f "$f" ] || continue
            t=$(grep  -oP 'tests="\K[0-9]+'    "$f" | head -1)
            fa=$(grep -oP 'failures="\K[0-9]+' "$f" | head -1)
            sk=$(grep -oP 'skipped="\K[0-9]+'  "$f" | head -1)
            er=$(grep -oP 'errors="\K[0-9]+'   "$f" | head -1)
            TOTAL=$((TOTAL   + ${t:-0}))
            FAILED=$((FAILED  + ${fa:-0}))
            SKIPPED=$((SKIPPED + ${sk:-0}))
            ERRORS=$((ERRORS  + ${er:-0}))
          done
          PASSED=$((TOTAL - FAILED - SKIPPED - ERRORS))
          [ "$TOTAL" -gt 0 ] && PASS_PCT=$((PASSED * 100 / TOTAL)) || PASS_PCT=0
          echo "total=$TOTAL"       >> $GITHUB_OUTPUT
          echo "passed=$PASSED"     >> $GITHUB_OUTPUT
          echo "failed=$FAILED"     >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED"   >> $GITHUB_OUTPUT
          echo "errors=$ERRORS"     >> $GITHUB_OUTPUT
          echo "pass_pct=$PASS_PCT" >> $GITHUB_OUTPUT
          echo "### API Test Results: $PASSED/$TOTAL passed ($PASS_PCT%)" >> $GITHUB_STEP_SUMMARY

      - name: Upload Allure Results - API tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-api-${{ github.run_number }}
          path: qa/api-tests/target/allure-results/
          retention-days: 30

      - name: Generate Allure Report (API tests)
        if: always()
        working-directory: ./qa/api-tests
        run: mvn allure:report --no-transfer-progress

      - name: Upload Allure Report - API tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-api-${{ github.run_number }}
          path: qa/api-tests/target/site/allure-maven-plugin/
          retention-days: 14

      - name: Upload Surefire XML reports - API tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports-api-${{ github.run_number }}
          path: qa/api-tests/target/surefire-reports/
          retention-days: 14

      - name: Run UI tests (Selenium)
        if: always()
        working-directory: ./qa/ui-tests
        run: mvn -B test

      - name: Parse test results (UI tests)
        if: always()
        id: parse-ui-results
        run: |
          TOTAL=0; PASSED=0; FAILED=0; SKIPPED=0; ERRORS=0
          for f in qa/ui-tests/target/surefire-reports/TEST-*.xml; do
            [ -f "$f" ] || continue
            t=$(grep  -oP 'tests="\K[0-9]+'    "$f" | head -1)
            fa=$(grep -oP 'failures="\K[0-9]+' "$f" | head -1)
            sk=$(grep -oP 'skipped="\K[0-9]+'  "$f" | head -1)
            er=$(grep -oP 'errors="\K[0-9]+'   "$f" | head -1)
            TOTAL=$((TOTAL   + ${t:-0}))
            FAILED=$((FAILED  + ${fa:-0}))
            SKIPPED=$((SKIPPED + ${sk:-0}))
            ERRORS=$((ERRORS  + ${er:-0}))
          done
          PASSED=$((TOTAL - FAILED - SKIPPED - ERRORS))
          [ "$TOTAL" -gt 0 ] && PASS_PCT=$((PASSED * 100 / TOTAL)) || PASS_PCT=0
          echo "total=$TOTAL"       >> $GITHUB_OUTPUT
          echo "passed=$PASSED"     >> $GITHUB_OUTPUT
          echo "failed=$FAILED"     >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED"   >> $GITHUB_OUTPUT
          echo "errors=$ERRORS"     >> $GITHUB_OUTPUT
          echo "pass_pct=$PASS_PCT" >> $GITHUB_OUTPUT
          echo "### UI Test Results: $PASSED/$TOTAL passed ($PASS_PCT%)" >> $GITHUB_STEP_SUMMARY

      - name: Upload Allure Results - UI tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-ui-${{ github.run_number }}
          path: qa/ui-tests/target/allure-results/
          retention-days: 30

      - name: Generate Allure Report (UI tests)
        if: always()
        working-directory: ./qa/ui-tests
        run: mvn allure:report --no-transfer-progress

      - name: Upload Allure Report - UI tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-ui-${{ github.run_number }}
          path: qa/ui-tests/target/site/allure-maven-plugin/
          retention-days: 14

      - name: Upload Surefire XML reports - UI tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports-ui-${{ github.run_number }}
          path: qa/ui-tests/target/surefire-reports/
          retention-days: 14

      - name: Compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop app
        if: always()
        run: docker compose down -v

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t communityboard-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t communityboard-frontend:ci ./frontend
      - name: Build data-engineering image
        run: docker build -t communityboard-etl:ci ./data-engineering

