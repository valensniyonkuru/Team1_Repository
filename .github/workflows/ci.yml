name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: communityboard
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - name: Build backend
        working-directory: ./backend
        run: mvn -B clean package -DskipTests
      - name: Run backend tests
        working-directory: ./backend
        run: mvn -B test
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/communityboard
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

  qa:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Start app via Docker Compose
        run: docker compose up -d --build

      - name: Wait for backend to be ready
        run: |
          for i in {1..60}; do
            if curl -fsS "http://localhost:8080/api-docs" > /dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready in time"
          docker compose ps
          docker compose logs backend || true
          exit 1

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Run API tests (REST Assured)
        working-directory: ./qa/api-tests
        run: mvn -B test

      - name: Run UI tests (Selenium)
        working-directory: ./qa/ui-tests
        run: mvn -B test

      - name: Compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop app
        if: always()
        run: docker compose down -v

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t communityboard-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t communityboard-frontend:ci ./frontend
      - name: Build data-engineering image
        run: docker build -t communityboard-etl:ci ./data-engineering

