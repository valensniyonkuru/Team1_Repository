version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: communityboard-db-staging
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-communityboard}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata-staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-communityboard}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - communityboard-staging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: ${DOCKER_REGISTRY}/${DOCKER_NAMESPACE}/communityboard-backend:staging
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    container_name: communityboard-backend-staging
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-communityboard}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES:-staging}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - communityboard-staging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ${DOCKER_REGISTRY}/${DOCKER_NAMESPACE}/communityboard-frontend:staging
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
    container_name: communityboard-frontend-staging
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - communityboard-staging
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8080}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  etl:
    image: ${DOCKER_REGISTRY}/${DOCKER_NAMESPACE}/communityboard-etl:staging
    build:
      context: .
      dockerfile: data-engineering/Dockerfile.prod
    container_name: communityboard-etl-staging
    restart: always
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-communityboard}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - communityboard-staging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata-staging:
    driver: local

networks:
  communityboard-staging:
    driver: bridge
