# Full nginx configuration - used by both Dockerfile (dev) and Dockerfile.prod
# Configured for non-root execution (port 3000, tmp-based temp dirs)

worker_processes auto;
pid /tmp/nginx.pid;

error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Temp paths required for non-root nginx operation
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    # Logging to stdout/stderr for container environments
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # Gzip compression for static assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    server {
        listen 3000;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options         "SAMEORIGIN"                    always;
        add_header X-XSS-Protection        "1; mode=block"                 always;
        add_header X-Content-Type-Options  "nosniff"                       always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy      "geolocation=(), microphone=()" always;

        # Cache control for static assets (JS/CSS/images have content hashes in CRA)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # No cache for HTML (SPA entry point must always be fresh)
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }

        # React SPA: send all routes to index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to the backend service
        # Use Docker's internal DNS resolver (127.0.0.11) so nginx resolves
        # 'backend' at request time, not at startup — prevents crash-loop when
        # the backend container restarts or isn't ready yet.
        location /api/ {
            resolver 127.0.0.11 valid=30s ipv6=off;
            set $backend_upstream http://backend:8080;
            proxy_pass         $backend_upstream;
            proxy_http_version 1.1;

            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   Connection         "";

            proxy_connect_timeout  10s;
            proxy_send_timeout     60s;
            proxy_read_timeout     60s;

            # Disable caching for API responses
            add_header Cache-Control "no-store, no-cache" always;
        }

        # Health check endpoint (used by Docker and load balancers)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Hide nginx version
        server_tokens off;
    }
}
