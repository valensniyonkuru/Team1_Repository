# docker-compose.production.yml — Production Environment (main branch)
# Usage: docker compose -f docker-compose.production.yml up -d
# Required env vars: DB_PASSWORD, JWT_SECRET, DOCKER_REGISTRY, DOCKER_NAMESPACE, REACT_APP_API_URL, MAIL_USERNAME, MAIL_PASSWORD

services:
  postgres:
    image: postgres:15-alpine
    container_name: communityboard-db-prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-communityboard}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-communityboard}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - communityboard-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: communityboard-redis-prod
    restart: always
    # No host port exposure — Redis is internal only
    networks:
      - communityboard-prod
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  backend:
    image: ${DOCKER_REGISTRY}/${DOCKER_NAMESPACE}/communityboard-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    container_name: communityboard-backend-prod
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-communityboard}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET}
      SERVER_PORT: ${SERVER_PORT:-8080}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES:-production}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - communityboard-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ${DOCKER_REGISTRY}/${DOCKER_NAMESPACE}/communityboard-frontend:latest
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
    container_name: communityboard-frontend-prod
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - communityboard-prod
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  etl:
    image: ${DOCKER_REGISTRY}/${DOCKER_NAMESPACE}/communityboard-etl:latest
    build:
      context: .
      dockerfile: data-engineering/Dockerfile.prod
    container_name: communityboard-etl-prod
    restart: on-failure
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-communityboard}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Admin User}
      SEED_USER_EMAIL: ${SEED_USER_EMAIL}
      SEED_USER_NAME: ${SEED_USER_NAME:-Test User}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - communityboard-prod
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  pgdata-prod:
    driver: local

networks:
  communityboard-prod:
    driver: bridge
